services:
  bot:
    build: .
    env_file: .env
    volumes:
      - ${PROJECTS_BASE_PATH:-.}:/projects
    environment:
      - PROJECTS_BASE_PATH=/projects
      - OPENCODE_BIN=opencode
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 128M
